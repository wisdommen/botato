name: Package Mod

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version_number' mods-unpacked/Pasha-AutoBattlerEnhanced/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "MOD_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create zip archive
        run: cd mods-unpacked && zip -r ../Pasha-AutoBattlerEnhanced.zip Pasha-AutoBattlerEnhanced/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pasha-AutoBattlerEnhanced-v${{ steps.version.outputs.version }}
          path: Pasha-AutoBattlerEnhanced.zip
          retention-days: 30

  deploy:
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Pasha-AutoBattlerEnhanced-v${{ needs.package.outputs.version }}
          path: artifact

      - name: Prepare workshop content
        run: |
          mkdir -p workshop/content
          cp artifact/Pasha-AutoBattlerEnhanced.zip workshop/content/

      - name: Write VDF config
        run: |
          cat > workshop/workshop_item.vdf <<VDFEOF
          "workshopitem"
          {
              "appid"           "1942280"
              "publishedfileid" "3707261407"
              "contentfolder"   "${GITHUB_WORKSPACE}/workshop/content"
              "visibility"      "2"
              "changenote"      "Auto-deploy from ${GITHUB_SHA}"
          }
          VDFEOF

      - name: Install SteamCMD
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq lib32gcc-s1
          mkdir -p /tmp/steamcmd
          curl -sL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz | tar -xz -C /tmp/steamcmd

      - name: Restore Steam config
        run: |
          mkdir -p ~/Steam/config
          echo "${{ secrets.STEAM_CONFIG_VDF }}" | base64 -d > ~/Steam/config/config.vdf

      - name: Upload to Steam Workshop
        env:
          STEAM_USER: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASS: ${{ secrets.STEAM_PASSWORD }}
        run: |
          /tmp/steamcmd/steamcmd.sh \
            +login "$STEAM_USER" "$STEAM_PASS" \
            +workshop_build_item "${{ github.workspace }}/workshop/workshop_item.vdf" \
            +quit
